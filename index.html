<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Necromancy Grid: Skeleton vs Poison</title>
    <style>
        :root {
            --bg-main: #0c0914;
            --bg-card: #161224;
            --color-skelly: #e2e8f0;
            --color-poison: #39ff14;
            --text-main: #cbd5e1;
            --text-dim: #475569;
            --neon-shadow-skelly: 0 0 15px rgba(226, 232, 240, 0.6);
            --neon-shadow-poison: 0 0 15px rgba(57, 255, 20, 0.6);
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #201535 0%, #0c0914 100%);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 30px;
            background: rgba(22, 18, 36, 0.8);
            border-radius: 20px;
            border: 1px solid #31255a;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin: 0;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.4);
            text-align: center;
            color: #a78bfa;
        }

        /* Dashboards & Controls */
        .controls, .scoreboard {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: space-between;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
        }

        label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, .toggle-btn {
            background: #1f1936;
            color: var(--text-main);
            border: 1px solid #3c2f6b;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        select:hover, .toggle-btn:hover {
            border-color: var(--color-skelly);
            box-shadow: 0 0 8px rgba(226, 232, 240, 0.3);
        }

        .toggle-btn.active {
            background: rgba(57, 255, 20, 0.15);
            border-color: var(--color-poison);
            color: var(--color-poison);
            text-shadow: 0 0 5px var(--color-poison);
        }

        .score-box {
            background: #110d21;
            padding: 10px 15px;
            border-radius: 8px;
            text-align: center;
            flex: 1;
            border: 1px solid #281e47;
        }

        .score-box .num {
            font-size: 1.5rem;
            font-weight: bold;
            display: block;
            margin-top: 5px;
        }

        #score-skelly { color: var(--color-skelly); text-shadow: var(--neon-shadow-skelly); }
        #score-poison { color: var(--color-poison); text-shadow: var(--neon-shadow-poison); }

        /* Match Status display */
        .status-display {
            font-size: 1.1rem;
            letter-spacing: 1px;
            height: 30px;
            text-transform: uppercase;
            text-align: center;
            transition: all 0.3s;
        }

        /* Matrix Grid Arena */
        .matrix-board {
            display: grid;
            grid-template-columns: repeat(3, 110px);
            grid-template-rows: repeat(3, 110px);
            gap: 15px;
            position: relative;
        }

        .node {
            background: #120e1f;
            border: 2px solid #31255a;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            position: relative;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
            user-select: none;
        }

        .node:hover:not(.occupied) {
            background: #1b1530;
            border-color: #7c3aed;
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.4);
        }

        /* Node States */
        .node.skelly-mark {
            border-color: var(--color-skelly);
            box-shadow: inset 0 0 10px rgba(226, 232, 240, 0.2), var(--neon-shadow-skelly);
        }

        .node.poison-mark {
            border-color: var(--color-poison);
            box-shadow: inset 0 0 10px rgba(57, 255, 20, 0.2), var(--neon-shadow-poison);
        }

        /* Decay Indicator Effect */
        .node.fading {
            opacity: 0.3;
            animation: glitch 0.5s infinite alternate;
        }

        .node.winner-node {
            background: rgba(139, 92, 246, 0.2) !important;
            border-color: #a78bfa !important;
            box-shadow: 0 0 20px #8b5cf6;
        }

        /* Action Buttons */
        .action-container {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .btn-action {
            flex: 1;
            background: transparent;
            color: var(--text-main);
            border: 2px solid #3c2f6b;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .btn-action:hover {
            background: var(--text-main);
            color: var(--bg-main);
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        #reset-scores {
            border-color: #581c1c;
            color: #f87171;
        }
        #reset-scores:hover {
            background: #f87171;
            color: var(--bg-main);
            box-shadow: 0 0 15px rgba(248, 113, 113, 0.4);
        }

        /* Screen shake logic on victory */
        .shake {
            animation: screenShake 0.4s ease-in-out;
        }

        @keyframes screenShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        @keyframes glitch {
            0% { filter: contrast(1); opacity: 0.4; }
            100% { filter: contrast(1.5); opacity: 0.15; }
        }
    </style>
</head>
<body>

    <div class="container" id="app-container">
        <h1>Necro Grid</h1>

        <!-- Settings Dashboard -->
        <div class="controls">
            <div class="control-group">
                <label>Opponent Ritual</label>
                <select id="game-mode">
                    <option value="pvp">Local PvP</option>
                    <option value="ai-easy">Voodoo AI: Easy</option>
                    <option value="ai-hard">Voodoo AI: Hard</option>
                </select>
            </div>
            <div class="control-group">
                <label>Quantum Decay</label>
                <button class="toggle-btn" id="decay-toggle">OFF (Max 3 Moves)</button>
            </div>
        </div>

        <!-- Scoreboard Matrix -->
        <div class="scoreboard">
            <div class="score-box">💀 Hordes <span class="num" id="score-skelly">0</span></div>
            <div class="score-box">Ties <span class="num" id="score-ties">0</span></div>
            <div class="score-box">☠️ Toxins <span class="num" id="score-poison">0</span></div>
        </div>

        <!-- Terminal Output -->
        <div class="status-display" id="status-term">Summoning Grid...</div>

        <!-- Main Node Matrix -->
        <div class="matrix-board" id="matrix-board">
            <div class="node" data-idx="0"></div>
            <div class="node" data-idx="1"></div>
            <div class="node" data-idx="2"></div>
            <div class="node" data-idx="3"></div>
            <div class="node" data-idx="4"></div>
            <div class="node" data-idx="5"></div>
            <div class="node" data-idx="6"></div>
            <div class="node" data-idx="7"></div>
            <div class="node" data-idx="8"></div>
        </div>

        <!-- System Reset Hooks -->
        <div class="action-container">
            <button class="btn-action" id="reset-board">Purge Grid</button>
            <button class="btn-action" id="reset-scores">Erase Lore</button>
        </div>
    </div>

    <script>
        const appContainer = document.getElementById('app-container');
        const boardElem = document.getElementById('matrix-board');
        const nodes = document.querySelectorAll('.node');
        const statusTerm = document.getElementById('status-term');
        const modeSelect = document.getElementById('game-mode');
        const decayToggle = document.getElementById('decay-toggle');
        
        const scoreSkellyElem = document.getElementById('score-skelly');
        const scorePoisonElem = document.getElementById('score-poison');
        const scoreTiesElem = document.getElementById('score-ties');

        // Internal engine mappings: "S" = Skeleton (💀), "P" = Poison (☠️)
        const SKELLY = "💀";
        const POISON = "☠️";

        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = SKELLY; 
        let isGameActive = true;
        let scores = { skelly: 0, poison: 0, ties: 0 };
        
        let decayMode = false;
        let moveHistory = { [SKELLY]: [], [POISON]: [] };

        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        // Init App Engine
        updateStatusDisplay();

        // Listeners
        boardElem.addEventListener('click', (e) => {
            if (!e.target.classList.contains('node') || !isGameActive) return;
            const idx = parseInt(e.target.dataset.idx);
            
            if (board[idx] !== "") return; 
            if (currentPlayer === POISON && modeSelect.value.startsWith('ai')) return; 

            executeMove(idx);
        });

        modeSelect.addEventListener('change', resetBoard);
        decayToggle.addEventListener('click', () => {
            decayMode = !decayMode;
            decayToggle.classList.toggle('active', decayMode);
            decayToggle.textContent = decayMode ? "ON (Max 3 Moves)" : "OFF (Max 3 Moves)";
            resetBoard();
        });

        document.getElementById('reset-board').addEventListener('click', resetBoard);
        document.getElementById('reset-scores').addEventListener('click', () => {
            scores = { skelly: 0, poison: 0, ties: 0 };
            scoreSkellyElem.textContent = 0;
            scorePoisonElem.textContent = 0;
            scoreTiesElem.textContent = 0;
            resetBoard();
        });

        function updateStatusDisplay() {
            if (isGameActive) {
                statusTerm.textContent = `CURRENT TURN: ${currentPlayer}`;
                statusTerm.style.color = currentPlayer === SKELLY ? 'var(--color-skelly)' : 'var(--color-poison)';
            }
        }

        function executeMove(idx) {
            board[idx] = currentPlayer;
            moveHistory[currentPlayer].push(idx);
            
            // Render state
            const node = nodes[idx];
            node.textContent = currentPlayer;
            node.classList.add(currentPlayer === SKELLY ? 'skelly-mark' : 'poison-mark', 'occupied');

            // Decay Mechanics Processing
            if (decayMode && moveHistory[currentPlayer].length > 3) {
                const expiredIdx = moveHistory[currentPlayer].shift();
                board[expiredIdx] = "";
                nodes[expiredIdx].textContent = "";
                nodes[expiredIdx].className = "node";
            }

            // Flag upcoming decay warning
            if (decayMode) {
                nodes.forEach(n => n.classList.remove('fading'));
                [SKELLY, POISON].forEach(p => {
                    if (moveHistory[p].length === 3) {
                        nodes[moveHistory[p][0]].classList.add('fading');
                    }
                });
            }

            evaluateMatrix();
        }

        function evaluateMatrix() {
            let roundWon = false;
            let winCombo = [];

            for (let condition of winConditions) {
                const [a, b, c] = condition;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    roundWon = true;
                    winCombo = condition;
                    break;
                }
            }

            if (roundWon) {
                triggerVictory(winCombo);
                return;
            }

            if (!board.includes("")) {
                triggerDraw();
                return;
            }

            // Rotate Player turn
            currentPlayer = currentPlayer === SKELLY ? POISON : SKELLY;
            updateStatusDisplay();

            // AI Execution Branch
            if (isGameActive && currentPlayer === POISON && modeSelect.value.startsWith('ai')) {
                setTimeout(runAiLogic, 400); 
            }
        }

        function triggerVictory(combo) {
            isGameActive = false;
            const trackerKey = currentPlayer === SKELLY ? 'skelly' : 'poison';
            scores[trackerKey]++;
            
            scoreSkellyElem.textContent = scores.skelly;
            scorePoisonElem.textContent = scores.poison;
            
            statusTerm.textContent = `TRIUMPH: ${currentPlayer} REIGNS SUPREME!`;
            statusTerm.style.color = '#a78bfa';
            
            combo.forEach(idx => nodes[idx].classList.add('winner-node'));
            
            appContainer.classList.add('shake');
            setTimeout(() => appContainer.classList.remove('shake'), 400);
        }

        function triggerDraw() {
            isGameActive = false;
            scores.ties++;
            scoreTiesElem.textContent = scores.ties;
            statusTerm.textContent = "SOULS ENTANGLED: STALEMATE";
            statusTerm.style.color = "var(--text-dim)";
        }

        function resetBoard() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = SKELLY;
            isGameActive = true;
            moveHistory = { [SKELLY]: [], [POISON]: [] };
            updateStatusDisplay();
            nodes.forEach(node => {
                node.textContent = "";
                node.className = "node";
            });
        }

        /* Voodoo Intelligence Processing Layer (AI Engine) */
        function runAiLogic() {
            const currentMode = modeSelect.value;
            let targetIdx;

            if (currentMode === 'ai-easy' || decayMode) {
                let available = board.map((val, idx) => val === "" ? idx : null).filter(val => val !== null);
                targetIdx = available[Math.floor(Math.random() * available.length)];
            } else {
                targetIdx = calculateBestMove();
            }

            if (targetIdx !== undefined && targetIdx !== null) {
                executeMove(targetIdx);
            }
        }

        function calculateBestMove() {
            let bestScore = -Infinity;
            let move;
            for (let i = 0; i < 9; i++) {
                if (board[i] === "") {
                    board[i] = POISON;
                    let score = minimax(board, 0, false);
                    board[i] = "";
                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            return move;
        }

        function minimax(currBoard, depth, isMaximizing) {
            let result = evaluateBoardStateForAi();
            if (result !== null) return result;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (currBoard[i] === "") {
                        currBoard[i] = POISON;
                        let score = minimax(currBoard, depth + 1, false);
                        currBoard[i] = "";
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (currBoard[i] === "") {
                        currBoard[i] = SKELLY;
                        let score = minimax(currBoard, depth + 1, true);
                        currBoard[i] = "";
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function evaluateBoardStateForAi() {
            for (let condition of winConditions) {
                const [a, b, c] = condition;
                if (board[a] === POISON && board[b] === POISON && board[c] === POISON) return 10;
                if (board[a] === SKELLY && board[b] === SKELLY && board[c] === SKELLY) return -10;
            }
            if (!board.includes("")) return 0;
            return null;
        }
    </script>
</body>
</html>
